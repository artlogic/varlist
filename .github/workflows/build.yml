# This is a basic workflow to help you get started with Actions

name: Build Disk Image

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      # This will install Merlin32 on your Github Runner machine
      - name: Install Merlin32
        uses: digarok/install-merlin32-action@master

      # This will install Cadius on your Github Runner machine
      - name: Install Cadius
        uses: digarok/install-cadius-action@master
        with:
          include_prodos: true

      # Now you can use it to assemble your source code
      - name: Assembly Step
        run: merlin32 varlist.s

      # Now you can use it to create a new bootable ProDOS disk
      - name: Create Boot Volume
        run: |
          cadius createvolume varlist.po VARLIST 140KB
          cadius addfile varlist.po /VARLIST/ ./PRODOS.2.4.2/PRODOS
          cadius addfile varlist.po /VARLIST/ ./PRODOS.2.4.2/BASIC.SYSTEM
          cadius addfile varlist.po /VARLIST/ VARLIST\#060300
